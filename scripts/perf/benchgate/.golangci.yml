# benchgate는 perf 회귀 게이트 CLI 도구(main 패키지)로, 상위의 공용 라이브러리
# 프로파일(../../../.golangci.yml)을 그대로 상속하지 않는다. 라이브러리용 strict
# 항목 중 이 도구에 부적합한 것을 명시적 근거와 함께 제외한다:
#   - gosec: 빌드 도구는 본질적으로 `go test`를 exec(G204)하고 policy/result 파일을
#     경로로 읽는다(G304/G703). candidate 경로는 ensureSafePerfCandidatePath에서
#     symlink/traversal/artifacts-루트 검사로 이미 가드된다.
#   - funlen/gocyclo/gocognit/dupl: 877줄 Python 원본의 1:1 충실 포팅으로, byte-exact
#     대조를 위해 flat procedural 구조를 의도적으로 보존한다.
#   - errcheck check-blank/check-type-assertions: 검증 완료된 policy 값에 대한
#     zero-value-fallback 단언과 stdout/stderr/파일 write의 에러 무시는 원본 동작과
#     동일한 의도적 설계다(상위 config도 이 패턴을 의도적 설계로 인정).
#   - shadow: 순차 검증에서 err 이름 재사용은 Python 흐름을 그대로 따른 것이다.
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - errorlint
    - errname
    - misspell
    - unconvert
    - wastedassign
    - whitespace
    - predeclared

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (*os.File).Sync
        - (*os.File).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

formatters:
  enable:
    - gci
    - gofmt
    - goimports

  settings:
    gci:
      sections:
        - standard
        - default
