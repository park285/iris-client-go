version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gomod

linters:
  default: none
  enable:
    # correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # resources / context / concurrency
    - bodyclose
    - containedctx
    - contextcheck
    - noctx
    - fatcontext
    - copyloopvar

    # modern Go / stdlib / simplification
    - canonicalheader
    - durationcheck
    - embeddedstructfieldcheck
    - exptostd
    - intrange
    - makezero
    - mirror
    - modernize
    - recvcheck
    - unconvert
    - usestdlibvars

    # errors
    - errname
    - errorlint
    - nilerr
    - nilnesserr
    - nilnil
    - wrapcheck

    # style / docs / readability
    - godot
    - dupl
    - misspell
    - nakedret
    - nlreturn
    - nonamedreturns
    - nolintlint
    - predeclared
    - revive
    - sloglint
    - whitespace
    - wsl_v5
    - wastedassign

    # maintainability
    - funlen
    - goconst
    - gocognit
    - gocritic
    - gocyclo
    - interfacebloat
    - maintidx
    - nestif
    - prealloc

    # tests
    - testifylint
    - thelper
    - tparallel
    - usetesting

    # security / text safety
    - bidichk
    - gosec

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true
      disable:
        - fieldalignment

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1020
        - -ST1021
        - -ST1022

    gocyclo:
      min-complexity: 12

    gocognit:
      min-complexity: 14

    dupl:
      threshold: 70

    goconst:
      min-len: 3
      min-occurrences: 4

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - exitAfterDefer
        - paramTypeCombine
        - unnamedResult
        - filepathJoin
        - hugeParam
        - emptyStringTest

    funlen:
      lines: 60
      statements: 35
      ignore-comments: true

    revive:
      severity: error
      enable-default-rules: true
      directives:
        - name: specify-disable-reason
          severity: error
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: use-any
        - name: use-errors-new
        - name: use-fmt-print
        - name: time-date
        - name: time-equal
        - name: error-naming
        - name: error-return
        - name: context-as-argument
        - name: unexported-naming
        - name: unnecessary-format
        - name: unnecessary-if
        - name: unsecure-url-scheme
        - name: use-waitgroup-go

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    wsl_v5:
      default: all
      allow-first-in-block: false
      allow-whole-block: false
      branch-max-lines: 2
      case-max-lines: 0

    godot:
      scope: declarations
      capital: true

    copyloopvar:
      check-alias: true

    fatcontext:
      check-struct-pointers: true

    embeddedstructfieldcheck:
      empty-line: true
      forbid-mutex: true

    nilnil:
      only-two: false
      detect-opposite: true

    nlreturn:
      block-size: 2

    nonamedreturns:
      report-error-in-defer: true

    predeclared:
      qualified-name: true

    wrapcheck:
      report-internal-errors: true

    usestdlibvars:
      http-method: true
      http-status-code: true
      time-date-month: true
      time-weekday: true
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true
      constant-kind: true

    interfacebloat:
      max: 5

    maintidx:
      under: 35

    nestif:
      min-complexity: 4

    testifylint:
      enable-all: true

    usetesting:
      os-temp-dir: true
      context-background: true
      context-todo: true

  exclusions:
    generated: strict
    warn-unused: true
    rules:
      - linters:
          - contextcheck
        text: 'Non-inherited new context'

      - linters:
          - gosec
        text: "G115:"

      - linters:
          - gosec
        text: "G117:"

      - linters:
          - gosec
        text: "G704:"

    paths:
      - vendor

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  new: false

formatters:
  enable:
    - gci
    - gofumpt
    - goimports

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(park285/iris-client-go)
      custom-order: true
      no-inline-comments: true
      no-prefix-comments: true

    gofumpt:
      module-path: park285/iris-client-go
      extra-rules: true

    goimports:
      local-prefixes:
        - park285/iris-client-go

  exclusions:
    generated: strict
    warn-unused: true
    paths:
      - vendor
