version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gomod

# v2: linters + formatters are configured separately.
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    - bodyclose
    - noctx
    - contextcheck

    - errorlint
    - errname

    - dupl
    - goconst
    - gocritic
    - intrange
    - modernize
    - misspell
    - predeclared
    - revive
    - wastedassign
    - whitespace

    - gocyclo
    - gocognit
    - funlen

    - prealloc

    - bidichk
    - gosec

    - sloglint

    - durationcheck
    - unconvert
    - nakedret

  settings:
    errcheck:
      check-type-assertions: true
      # check-blank 비활성: HTTP 클라이언트의 best-effort drain(io.Copy/io.ReadAll)과
      # `var _ error = (*T)(nil)` 인터페이스 적합성 관용구를 오탐하지 않도록.
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close

    govet:
      enable-all: true
      disable:
        - fieldalignment

    gocyclo:
      min-complexity: 17

    gocognit:
      min-complexity: 31

    dupl:
      threshold: 200

    goconst:
      min-len: 3
      min-occurrences: 5

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - exitAfterDefer
        - paramTypeCombine
        - unnamedResult
        - filepathJoin
        - hugeParam
        - emptyStringTest

    funlen:
      lines: 90
      statements: 45

    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

  exclusions:
    rules:
      - linters:
          - contextcheck
        text: 'Non-inherited new context'

      - linters:
          - gocyclo
          - errcheck
          - dupl
          - funlen
        path: _test\.go

      # G101: env var 이름 상수(IRIS_BOT_TOKEN 등)를 하드코딩 자격증명으로 오탐
      - linters:
          - gosec
        text: "G101:"

      # G104: errcheck가 동일 검사를 담당하므로 중복(best-effort drain은 의도적)
      - linters:
          - gosec
        text: "G104:"

      # G304/G703: CA 인증서 등 호출자가 신뢰하는 경로를 읽는 라이브러리 동작
      - linters:
          - gosec
        text: "G304:"

      - linters:
          - gosec
        text: "G703:"

    paths:
      - '.*\.pb\.go$'
      - '.*_test\.go$'
      - vendor

formatters:
  enable:
    - gci
    - gofmt
    - goimports

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/park285/iris-client-go)
      custom-order: true

    goimports:
      local-prefixes:
        - github.com/park285/iris-client-go

  exclusions:
    paths:
      - '.*\.pb\.go$'
      - '.*_test\.go$'
      - vendor

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  new: false
