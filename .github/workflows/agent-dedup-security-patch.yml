name: agent webhook dedup security patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: agent-webhook-dedup-security-patch
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.head_ref == 'agent/fix-webhook-dedup-poisoning-20260715'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/fix-webhook-dedup-poisoning-20260715
          persist-credentials: true

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Apply security patch
        run: python3 scripts/ci/agent_dedup_security_patch.py

      - name: Format changed files
        run: |
          gofmt -w \
            webhook/handler.go \
            webhook/handler_test.go \
            webhook/dedup_poisoning_security_test.go

      - name: Run Go tests
        run: |
          set +e
          go test -count=1 ./... > /tmp/agent-go-test.log 2>&1
          status=$?
          cat /tmp/agent-go-test.log
          exit "$status"

      - name: Run Go vet
        run: go vet ./...

      - name: Validate patch
        run: |
          git diff --check
          if git diff --quiet; then
            echo "security patch produced no changes" >&2
            exit 1
          fi

      - name: Persist failure diagnostics
        if: failure()
        run: |
          mkdir -p .agent-diagnostics
          cp /tmp/agent-go-test.log .agent-diagnostics/go-test.log 2>/dev/null || echo "test log unavailable" > .agent-diagnostics/go-test.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agent-diagnostics/go-test.log
          git commit -m "chore: record dedup patch test failure"
          git push origin HEAD:agent/fix-webhook-dedup-poisoning-20260715

      - name: Commit verified patch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security: prevent webhook dedup poisoning"
          git push origin HEAD:agent/fix-webhook-dedup-poisoning-20260715
