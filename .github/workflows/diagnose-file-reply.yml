name: diagnose-file-reply

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Run target tests with compact failure output
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: bb364f86a9e8c99ae34d220ecf29365e663b1e4f
        run: |
          set -euo pipefail
          GO_BIN=/opt/hostedtoolcache/go/1.26.5/x64/bin/go

          mkdir target
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/park285/iris-client-go/tarball/${TARGET_SHA}" \
            | tar -xz --strip-components=1 -C target

          cd target
          if ! "${GO_BIN}" test -count=1 ./... >/tmp/iris-client-test.log 2>&1; then
            echo "--- compact test failure ---"
            tail -n 60 /tmp/iris-client-test.log | cut -c1-500
            exit 1
          fi
