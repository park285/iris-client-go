name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Workflow secret boundary
        run: bash scripts/ci/check-workflow-secrets.sh

      - name: Cross-cutting boundary guardrail
        run: bash scripts/ci/check-crosscutting-boundaries.sh

      - name: gofmt
        run: |
          mapfile -t files < <(find . -path './.git' -prune -o -name '*.go' -print)
          if (( ${#files[@]} == 0 )); then
            exit 0
          fi
          unformatted="$(gofmt -l "${files[@]}")"
          if [[ -n "${unformatted}" ]]; then
            echo "::error::gofmt required for the following files:"
            echo "${unformatted}"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -count=1 ./...
