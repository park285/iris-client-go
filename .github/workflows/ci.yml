name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Workflow secret boundary
        run: bash scripts/ci/check-workflow-secrets.sh

      - name: Cross-cutting boundary guardrail
        run: bash scripts/ci/check-crosscutting-boundaries.sh

      - name: gofmt
        run: |
          mapfile -t files < <(find . -path './.git' -prune -o -name '*.go' -print)
          if (( ${#files[@]} == 0 )); then
            exit 0
          fi
          unformatted="$(gofmt -l "${files[@]}")"
          if [[ -n "${unformatted}" ]]; then
            echo "::error::gofmt required for the following files:"
            echo "${unformatted}"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -count=1 ./...

      - name: perf gate oracle
        run: bash scripts/perf/check-bench-regression_test.sh
