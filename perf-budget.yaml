schemaVersion: 1
repo: iris-client-go
defaults:
  critical:
    max_ns_regression_percent: 10
    max_bytes_regression_percent: 10
    allow_alloc_increase: false
  hotpath:
    max_ns_regression_percent: 15
    max_bytes_regression_percent: 15
    allow_alloc_increase: false
  build_path:
    max_ns_regression_percent: 20
    max_bytes_regression_percent: 20
    allow_alloc_increase: warn
  non_critical:
    max_ns_regression_percent: 25
    max_bytes_regression_percent: 25
    allow_alloc_increase: warn
benchmarks:
  BenchmarkSignIrisRequestClientSigner: { package: ./internal/client, class: critical, gate: pr }
  BenchmarkSetIrisHMACHeaders: { package: ./internal/client, class: critical, gate: pr }
  BenchmarkRetryDelayForPlainError: { package: ./internal/client, class: critical, gate: pr }
  BenchmarkRetryDelayForRetryAfter: { package: ./internal/client, class: critical, gate: pr }
  BenchmarkCanonicalIrisTargetSimple: { package: ./internal/client, class: critical, gate: pr }
  BenchmarkCanonicalIrisTargetWithQuery: { package: ./internal/client, class: critical, gate: pr }
  BenchmarkNewSignedRequestHMACSmallJSON: { package: ./internal/client, class: critical, gate: pr }
  BenchmarkSha256HexBytesEmpty: { package: ./internal/client, class: critical, gate: pr }
  BenchmarkSignIrisRequestLegacyHelper: { package: ./internal/client, class: non_critical, gate: nightly }
  BenchmarkParseSSEStreamRoomEvents: { package: ./internal/client, class: hotpath, gate: pr }
  BenchmarkSendImage_Streaming: { package: ./internal/client, class: hotpath, gate: nightly }
  BenchmarkSendImage_BufferedBaseline: { package: ./internal/client, class: non_critical, gate: nightly }
  BenchmarkMultipartNaiveStreamingRegression: { package: ./internal/client, class: non_critical, gate: nightly }
  BenchmarkSchedulerShardIndex: { package: ./webhook, class: non_critical, gate: nightly }
settings:
  mode: warn
  benchstat_alpha: 0.05
  min_count: 6
  noise_floor_ns: 50
