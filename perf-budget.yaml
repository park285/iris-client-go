schemaVersion: 1
repo: iris-client-go
defaults:
  critical:
    max_ns_regression_percent: 10
    max_bytes_regression_percent: 10
    allow_alloc_increase: false
  hotpath:
    max_ns_regression_percent: 15
    max_bytes_regression_percent: 15
    allow_alloc_increase: false
  build_path:
    max_ns_regression_percent: 20
    max_bytes_regression_percent: 20
    allow_alloc_increase: warn
  non_critical:
    max_ns_regression_percent: 25
    max_bytes_regression_percent: 25
    allow_alloc_increase: warn
benchmarks:
  BenchmarkSignIrisRequestClientSigner: { package: ./internal/client, class: critical, gate: pr, harness_files: [internal/client/hmac_signer_test.go] }
  BenchmarkSetIrisHMACHeaders: { package: ./internal/client, class: critical, gate: pr, harness_files: [internal/client/perf_p0_02_bench_test.go] }
  BenchmarkRetryDelayForPlainError: { package: ./internal/client, class: critical, gate: pr, harness_files: [internal/client/perf_p0_02_bench_test.go] }
  BenchmarkRetryDelayForRetryAfter: { package: ./internal/client, class: critical, gate: pr, harness_files: [internal/client/perf_p0_02_bench_test.go] }
  BenchmarkCanonicalIrisTargetSimple: { package: ./internal/client, class: critical, gate: pr, harness_files: [internal/client/perf_p0_02_bench_test.go] }
  BenchmarkCanonicalIrisTargetWithQuery: { package: ./internal/client, class: critical, gate: pr, harness_files: [internal/client/perf_p0_02_bench_test.go] }
  BenchmarkNewSignedRequestHMACSmallJSON: { package: ./internal/client, class: critical, gate: pr, harness_files: [internal/client/hmac_hotpath_test.go] }
  BenchmarkSha256HexBytesEmpty: { package: ./internal/client, class: critical, gate: pr, harness_files: [internal/client/hmac_hotpath_test.go] }
  BenchmarkSignIrisRequestLegacyHelper: { package: ./internal/client, class: non_critical, gate: nightly, harness_files: [internal/client/hmac_signer_test.go] }
  BenchmarkParseSSEStreamRoomEvents: { package: ./internal/client, class: hotpath, gate: pr, harness_files: [internal/client/sse_hotpath_test.go] }
  BenchmarkSendImage_Streaming: { package: ./internal/client, class: hotpath, gate: nightly, harness_files: [internal/client/multipart_writer_bench_test.go] }
  BenchmarkSendImage_BufferedBaseline: { package: ./internal/client, class: non_critical, gate: nightly, harness_files: [internal/client/multipart_writer_bench_test.go] }
  BenchmarkMultipartNaiveStreamingRegression: { package: ./internal/client, class: non_critical, gate: nightly, harness_files: [internal/client/multipart_writer_bench_test.go] }
  BenchmarkSchedulerShardIndex: { package: ./webhook, class: non_critical, gate: nightly, harness_files: [webhook/scheduler_hash_test.go] }
settings:
  mode: fail
  benchstat_alpha: 0.05
  min_count: 6
  noise_floor_ns: 50
